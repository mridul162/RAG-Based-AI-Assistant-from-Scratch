embedding_context: |
  Premium wild Sundarbans Kholisha (Khalisha) Flower Honey (সুন্দরবনের খলিশা ফুলের মধু), also known as Padma Modhu. Collected from the blossoms of the Khalisha tree (Aegiceras corniculatum) in the mangrove forests of the Sundarbans, Bangladesh. Light golden color, delicate floral aroma, and rich taste. Highly valued for its purity, medicinal properties, and as one of the best Sundarbans honeys. Harvested seasonally by local Moualis.

