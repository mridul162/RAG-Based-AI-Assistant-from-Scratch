embedding_context: |
  Pure Hill Honey / পাহাড়ি মধু — Wild honey collected from the forests of the Chittagong Hill Tracts (Bandarban, Rangamati) and Sylhet region. Bees forage on diverse mountain flowers, herbs, and jungle flora, resulting in a rich, complex flavor and dark amber color. Highly valued for its purity, medicinal properties, antioxidants, and traditional health benefits. One of the most natural and potent honeys available in Bangladesh, harvested by local tribal communities.

