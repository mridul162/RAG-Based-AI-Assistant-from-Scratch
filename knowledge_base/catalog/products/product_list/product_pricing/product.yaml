embedding_context: >
  This document contains the complete product price catalog.
  It includes product categories, product names, retail prices,
  and wholesale prices in BDT.
  Use this information to answer customer questions about product prices,
  current rates, wholesale pricing, retail pricing, available products,
  and category-wise product lists.
  
  When answering price queries:
  - mention retail price first
  - mention wholesale price for bulk buyers
  - mention that prices may change
  - ask quantity for wholesale inquiries

