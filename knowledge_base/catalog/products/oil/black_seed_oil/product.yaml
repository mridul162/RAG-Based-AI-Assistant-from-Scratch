embedding_context: |
  Pure Black Seed Oil (কালোজিরার তেল / Kalojira Tel) cold-pressed from high-quality Nigella sativa (Kalojira) seeds. Also known as Black Cumin Seed Oil. Dark amber color with strong, slightly spicy aroma. Renowned for its powerful medicinal properties including immunity boosting, anti-inflammatory, antioxidant, and respiratory health benefits. Traditionally used in Bangladesh for skin care, hair growth, joint pain, and digestive health. One of the most valued therapeutic oils.

