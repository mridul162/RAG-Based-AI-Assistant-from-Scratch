embedding_context: >
  আখের পাটালি গুর (Sugarcane Patali Gur) is a traditional Bangladeshi unrefined
  jaggery made from sugarcane juice. It is molded into solid disc or cylindrical
  shapes (patali) and used as a natural sweetener in Bengali sweets, desserts,
  payesh, pitha, and everyday cooking. It has a characteristic rich, caramel-like
  flavor distinct from refined sugar or date palm gur (khejur gur). Sourced
  primarily from sugarcane-growing regions of Bangladesh such as Rajshahi,
  Faridpur, and Kushtia. A staple sweetener in Bangladeshi households seeking
  natural, chemical-free alternatives to white sugar.

