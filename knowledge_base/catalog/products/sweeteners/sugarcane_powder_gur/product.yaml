embedding_context: |
  আখের পাউডার গুড় (Sugarcane Powder Gur) is finely ground traditional Bangladeshi jaggery made from pure sugarcane juice. Unlike solid cube or patali gur, the powder form is very convenient for quick use in tea, milk, smoothies, baking, sweets, pitha, and payesh. It has a rich caramel-molasses flavor and retains all natural minerals and nutrients. Sourced from the best sugarcane regions of Bangladesh (Rajshahi, Faridpur, Kushtia). An excellent healthy, chemical-free alternative to refined white sugar.

