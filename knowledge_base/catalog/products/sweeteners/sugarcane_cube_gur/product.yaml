embedding_context: |
  আখের কিউব গুড় (Sugarcane Cube Gur) is traditional Bangladeshi unrefined jaggery made from fresh sugarcane juice. It is boiled and molded into convenient cube or disc shapes. It has a rich caramel-molasses flavor, dark brown color, and is widely used in Bengali sweets, pitha, payesh, tea, and as a natural sugar substitute. Sourced from prime sugarcane regions like Rajshahi, Faridpur, and Kushtia. Much healthier than refined white sugar — retains natural minerals, vitamins, and antioxidants. A staple natural sweetener in Bangladeshi households.

